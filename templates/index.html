<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Credit Risk</title>

<style>
body {
    font-family: Arial;
    background: #f3f4f6;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 400px;
    background: white;
    padding: 20px;
    border-radius: 15px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    background: #3366cc;
    color: white;
    border: none;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<h2>AI Credit Risk Prediction</h2>

<form action="/predict" method="POST">

<label>Age</label>
<input type="number" name="age" required>

<label>Monthly Income</label>
<input type="number" name="monthly_income" required>

<label>Employment Years</label>
<input type="number" name="employment_years" required>

<label>Existing Loan</label>
<input type="number" name="existing_loan" required>

<label>Monthly Expense</label>
<input type="number" name="monthly_expense" required>

<label>Payment Behaviour</label>
<select name="payment_history">
    <option value="2">Good</option>
    <option value="1">Average</option>
    <option value="0">Poor</option>
</select>

<button type="submit">Predict Risk</button>

</form>

</div>

</body>
</html>
