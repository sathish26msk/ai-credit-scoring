<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- 🔥 THIS IS MOST IMPORTANT -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Credit Risk Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            margin-top: 10px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }

        /* 🔥 MOBILE FIX */
        @media (max-width: 480px) {
            .container {
                margin: 10px;
                padding: 15px;
            }

            h2 {
                font-size: 18px;
            }

            input, select {
                font-size: 13px;
                padding: 8px;
            }

            button {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>AI Credit Risk Prediction</h2>

    <form action="/predict" method="POST">

        <label>Age</label>
        <input type="number" name="age" required>

        <label>Monthly Income (₹)</label>
        <input type="number" name="monthly_income" required>

        <label>Employment Years</label>
        <input type="number" name="employment_years" required>

        <label>Existing Loan (₹)</label>
        <input type="number" name="existing_loan" required>

        <label>Monthly Expense (₹)</label>
        <input type="number" name="monthly_expense" required>

        <label>Payment Behaviour</label>
        <select name="payment_history" required>
            <option value="">-- Select --</option>
            <option value="2">Good</option>
            <option value="1">Average</option>
            <option value="0">Poor</option>
        </select>

        <button type="submit">Predict Risk</button>

    </form>
</div>

</body>
</html>
