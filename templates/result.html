<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- 🔥 MOBILE FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prediction Result</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 380px;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            margin: 10px;
        }

        h2 {
            margin-bottom: 15px;
        }

        .risk {
            font-size: 24px;
            font-weight: bold;
            margin: 15px 0;
        }

        .percentage {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .low {
            color: green;
        }

        .medium {
            color: orange;
        }

        .high {
            color: red;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            font-size: 15px;
            margin-top: 10px;
        }

        .btn:hover {
            background: #1e40af;
        }

        /* 🔥 MOBILE POLISH */
        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }

            .risk {
                font-size: 22px;
            }

            .percentage {
                font-size: 16px;
            }

            .btn {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Prediction Result</h2>

    <div class="risk 
        {% if result == 'Low Risk' %}low
        {% elif result == 'Medium Risk' %}medium
        {% else %}high{% endif %}">
        {{ result }}
    </div>

    <div class="percentage">
        Risk Score: {{ risk }}%
    </div>

    <a href="/" class="btn">Go Back</a>

</div>

</body>
</html>
