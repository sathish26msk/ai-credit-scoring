<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<style>
body {
    font-family: Arial;
    background: #f3f4f6;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 10px;
}

.card {
    width: 100%;
    max-width: 400px;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
}

/* LOW */
.low {
    color: #16a34a;
}
.low-bg {
    background: #dcfce7;
}

/* MEDIUM */
.medium {
    color: #f59e0b;
}
.medium-bg {
    background: #fef3c7;
}

/* HIGH */
.high {
    color: #dc2626;
}
.high-bg {
    background: #fee2e2;
}

ul {
    text-align: left;
}

button {
    width: 100%;
    padding: 12px;
    background: #3366cc;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="card 
{% if result == 'Low Risk' %}low-bg
{% elif result == 'Medium Risk' %}medium-bg
{% else %}high-bg{% endif %}">

<h2>Prediction Result</h2>

<h1 class="
{% if result == 'Low Risk' %}low
{% elif result == 'Medium Risk' %}medium
{% else %}high{% endif %}">
{{ result }}
</h1>

<p><strong>Risk Score:</strong> {{ risk }}%</p>

<h3>Why this result?</h3>
<ul>
{% for r in reasons %}
<li>{{ r }}</li>
{% endfor %}
</ul>

<button onclick="window.location.href='/'">Go Back</button>

</div>

</body>
</html>
