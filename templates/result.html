<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>

    <style>
        body {
            font-family: Arial;
            background: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3366cc;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 16px;
        }

        ul {
            text-align: left;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Prediction Result</h2>

    <h1 style="color: {{color}};">{{result}}</h1>

    <p>Risk Score: {{risk}}%</p>

    <h3>Reason:</h3>
    <ul>
        {% for r in reasons %}
        <li>{{r}}</li>
        {% endfor %}
    </ul>

    <button onclick="window.location.href='/'">Go Back</button>
</div>

</body>
</html>
